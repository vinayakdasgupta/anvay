<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitemap – anvay</title>
  <link rel="icon" type="image/png" href="/static/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/anvay.css') }}">
  <script>(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
  <nav>
    <div class="nav-logo"><a href="/"><span class="dot"></span> anvay</a></div>
    <div class="nav-links">
      <a href="/">Upload</a><a href="/about">About</a><a href="/docs">Documentation</a><a href="/contact">Contact</a>
      <button class="toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme"><span id="themeIcon"></span></button>
    </div>
  </nav>
  <div class="form-section">
  <h2 class="upload-heading">Sitemap</h2>
  <p class="upload-subheading">Explore available pages on Anvay.</p>

  <ul class="list-group list-group-flush mt-4">
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/" class="text-accent">Upload</a></li>
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/about" class="text-accent">About</a></li>
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/contact" class="text-accent">Contact</a></li>
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/sitemap" class="text-accent">Sitemap</a></li>
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/privacy" class="text-accent">Privacy Policy</a></li>
    <li class="list-group-item bg-transparent border-0 ps-0"><a href="/terms" class="text-accent">Terms of Use</a></li>
  </ul>
</div>
  {% include '_footer.html' %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const SUN=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="5" stroke-width="1.5"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 1v2m0 18v2m11-11h-2M3 12H1m17.07 4.93l-1.42-1.42M6.34 6.34L4.93 4.93m12.14 0l-1.41 1.41M6.34 17.66l-1.41 1.41"/></svg>`;
    const MOON=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`;
    function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);document.getElementById('themeIcon').innerHTML=n==='dark'?SUN:MOON;}
    window.addEventListener('DOMContentLoaded',()=>{const t=localStorage.getItem('theme')||'light';document.getElementById('themeIcon').innerHTML=t==='dark'?SUN:MOON;});
    document.querySelectorAll('.form-section a[href]').forEach(a=>{a.addEventListener('mouseenter',()=>{a.style.borderColor='var(--accent)';a.style.color='var(--accent)';});a.addEventListener('mouseleave',()=>{a.style.borderColor='';a.style.color='';});});
  </script>
</body>
</html>
